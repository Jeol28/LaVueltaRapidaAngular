<app-auth-form-card
  heroTitle="NUEVA"
  heroHighlight="CONTRASEÑA"
  heroSubtitle="Elige una contraseña segura para proteger tu cuenta"
  [cardTitle]="estado === 'exito' ? 'CONTRASEÑA ACTUALIZADA' : 'CREAR NUEVA CONTRASEÑA'"
  [cardSubtitle]="estado === 'exito' ? 'Ya puedes iniciar sesión con tu nueva contraseña' : 'Escribe tu nueva contraseña dos veces para confirmar'">

  <svg card-icon width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e10600" stroke-width="1.5">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </svg>

  <div *ngIf="errorMsg" class="reset-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ errorMsg }}
  </div>

  <form *ngIf="estado === 'formulario'" (ngSubmit)="onSubmit()" class="reset-form">

    <app-input-icon-field
      iconType="lock"
      label="Nueva contraseña"
      id="password"
      name="password"
      type="password"
      placeholder="Mínimo 6 caracteres"
      [required]="true"
      [(value)]="password"
      (valueChange)="checkPasswords()">
    </app-input-icon-field>

    <app-input-icon-field
      iconType="lock"
      label="Repetir contraseña"
      id="confirmPassword"
      name="confirmPassword"
      type="password"
      placeholder="Repite tu nueva contraseña"
      [required]="true"
      [errorMsg]="passwordErrorMsg"
      [(value)]="confirmPassword"
      (valueChange)="checkPasswords()">
    </app-input-icon-field>

    <button type="submit" class="btn-reset" [disabled]="cargando || !token">
      {{ cargando ? 'GUARDANDO...' : 'GUARDAR CONTRASEÑA' }}
    </button>

    <div class="reset-footer">
      <p>¿Recordaste tu contraseña? <a routerLink="/login">Inicia sesión aquí</a></p>
    </div>

  </form>

  <div *ngIf="estado === 'exito'" class="reset-exito">
    <div class="exito-icon">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <p class="exito-msg">Tu contraseña ha sido actualizada correctamente.</p>
    <p class="redireccionando">Redirigiendo al inicio de sesión en <strong>{{ cuenta }}</strong>...</p>
    <a routerLink="/login" class="btn-reset">IR AL INICIO DE SESIÓN</a>
  </div>

</app-auth-form-card>
