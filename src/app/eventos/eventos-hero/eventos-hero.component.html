<section class="ev-hero">
  <div class="ev-hero-stripe"></div>
  <div class="ev-hero-inner">
    <span class="ev-hero-label">TEMPORADA 2026</span>
    <h1 class="ev-hero-title">EVENTOS <span>F1</span></h1>
    <p class="ev-hero-sub">Sigue todas las carreras de la temporada más emocionante</p>
    <div class="ev-hero-stats">
      <div class="ev-stat">
        <span class="ev-stat-val">{{ total }}</span>
        <span class="ev-stat-label">Carreras</span>
      </div>
      <div class="ev-stat-divider"></div>
      <div class="ev-stat">
        <span class="ev-stat-val">{{ completadas }}</span>
        <span class="ev-stat-label">Completadas</span>
      </div>
      <div class="ev-stat-divider"></div>
      <div class="ev-stat">
        <span class="ev-stat-val">{{ restantes }}</span>
        <span class="ev-stat-label">Restantes</span>
      </div>
    </div>
  </div>
</section>
