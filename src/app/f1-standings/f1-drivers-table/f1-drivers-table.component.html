<div class="table-container">

  <div *ngIf="loading" class="table-status">Cargando clasificación…</div>

  <div *ngIf="error && !loading" class="table-status table-error">{{ error }}</div>

  <table class="rankings-table table-dark-custom" *ngIf="!loading && !error">
    <thead>
      <tr>
        <th class="position">POS</th>
        <th>PILOTO</th>
        <th>EQUIPO</th>
        <th class="points">PUNTOS</th>
        <th class="wins">V</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of pilotos"
          [class.first-place]="p.position === 1">
        <td class="position">{{ p.position }}</td>
        <td class="name">{{ p.name }}</td>
        <td class="team">{{ p.team }}</td>
        <td class="points">{{ p.points }}</td>
        <td class="wins">{{ p.wins }}</td>
      </tr>
    </tbody>
  </table>

</div>
