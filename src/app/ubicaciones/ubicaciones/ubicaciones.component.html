<div class="ub-page">
  <app-ub-hero></app-ub-hero>
  <app-ub-sedes [sedes]="sedes"></app-ub-sedes>
  <app-ub-proxima [aperturas]="proximasAperturas"></app-ub-proxima>

  <section class="ub-cta">
    <div class="ub-cta-inner">
      <span class="ub-cta-label">DOMICILIO GRATIS EN TODA LA CIUDAD</span>
      <h2 class="ub-cta-title">Pedido a <span>domicilio</span> en minutos</h2>
      <p class="ub-cta-sub">
        Llevamos tu pizza a cualquier rincón de Bogotá sin costo de envío,
        a la velocidad de un pit stop.
      </p>
      <div class="ub-cta-actions">
        <a routerLink="/menu" class="ub-cta-btn ub-cta-btn--primary">
          PEDIR AHORA
        </a>
        <a routerLink="/contacto" class="ub-cta-btn ub-cta-btn--ghost">
          IR A CONTACTO
        </a>
      </div>
    </div>
  </section>
</div>
