<a [routerLink]="['/producto', comida.id]" class="menu-card-link">
  <div class="menu-card">
    <img [src]="comida.image" [alt]="comida.name">
    <h4>{{ comida.name }}</h4>
    <p>{{ comida.description }}</p>
    <div class="menu-card-footer">
      <span class="price">{{ comida.price | currency:'$ ':'symbol':'1.0-0' }}</span>
    </div>
  </div>
</a>
